<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiscordDraft - Discord Preview</title>
  <meta name="description" content="Discordの投稿を本家UI風にプレビュー。OGPカード表示やDiscordタイムスタンプ変換にも対応。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="DiscordDraft - Discord Preview">
  <meta property="og:description" content="Discordの投稿を本家UI風にプレビュー。OGPカード表示やDiscordタイムスタンプ変換にも対応。">
  <meta name="twitter:card" content="summary">
  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === CSS Variables (Discord dark theme) === */
    :root {
      --bg-primary:   #313338;
      --bg-secondary: #2b2d31;
      --bg-tertiary:  #1e1f22;
      --bg-input:     #383a40;
      --bg-hover:     rgba(255,255,255,0.06);
      --text-normal:  #dbdee1;
      --text-muted:   #949ba4;
      --text-link:    #00a8fc;
      --brand:        #5865f2;
      --mention-bg:   rgba(88,101,242,0.15);
      --mention-fg:   #c9cdfb;
      --spoiler-bg:   #202225;
      --code-bg:      #2b2d31;
      --code-border:  #1e1f22;
      --quote-bar:    #4e5058;
      --border:       #3f4147;
      --green:        #23a559;
      --red:          #f23f43;
      --yellow:       #f0b232;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-normal);
      font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.375;
      overflow: hidden;
    }

    #app { display: flex; flex-direction: column; height: 100%; }

    /* === Tab nav === */
    .tab-nav {
      display: flex;
      gap: 2px;
      padding: 8px 12px 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
    }
    .tab-nav-spacer { flex: 1; }
    .lang-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
      padding: 3px;
    }
    .lang-opt {
      border-radius: 16px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .lang-opt.active {
      background: var(--brand);
      color: #fff;
    }
    .lang-toggle:hover .lang-opt:not(.active) { color: var(--text-normal); }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 4px 4px 0 0;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 16px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text-normal); }
    .tab-btn.active { color: var(--text-normal); border-bottom-color: var(--brand); }

    /* === Tab content === */
    .tab-content { display: none; flex: 1; min-height: 0; }
    .tab-content.active { display: flex; }

    /* === Preview tab layout === */
    #tab-preview { flex-direction: row; }

    /* === Input panel === */
    .panel-input {
      flex: 0 0 var(--input-panel-width, 42%);
      min-width: 280px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .col-resizer {
      width: 6px;
      background: var(--border);
      cursor: col-resize;
      flex: 0 0 6px;
      position: relative;
    }
    .col-resizer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity .12s;
    }
    .col-resizer:hover::after { opacity: 1; }
    body.resizing { cursor: col-resize; user-select: none; }
    .panel-input-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .settings-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .settings-input {
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-normal);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      padding: 4px 8px;
    }
    .settings-input:focus { border-color: var(--brand); }
    #channel-name-input { width: 130px; }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .toggle-wrap input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 32px;
      height: 18px;
      background: var(--bg-input);
      border-radius: 9px;
      cursor: pointer;
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }
    .toggle-wrap input[type=checkbox]::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left .2s;
    }
    .toggle-wrap input[type=checkbox]:checked { background: var(--brand); }
    .toggle-wrap input[type=checkbox]:checked::after { left: 16px; }

    /* Message list */
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Message editor */
    .message-editor {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .message-editor:focus-within { border-color: rgba(88,101,242,.5); }

    .msg-header-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-name-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-normal);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
      padding: 4px 8px;
    }
    .msg-name-input:focus { border-color: var(--brand); }

    .msg-color-input {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: none;
      overflow: hidden;
    }
    .msg-ctrl-btn {
      background: none;
      border: none;
      border-radius: 3px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 3px 6px;
      transition: color .1s, background .1s;
    }
    .msg-ctrl-btn:hover { color: var(--text-normal); background: var(--bg-hover); }
    .msg-ctrl-btn.del:hover { color: var(--red); }
    .msg-ctrl-btn.active { color: var(--text-normal); background: rgba(88,101,242,0.18); }

    .msg-textarea {
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-normal);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.375;
      min-height: 72px;
      max-height: 40vh;
      outline: none;
      padding: 7px 9px;
      resize: none;
      width: 100%;
      overflow-y: auto;
    }
    .msg-textarea:focus { border-color: var(--brand); }

    .msg-footer-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .plan-select {
      appearance: none;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      padding: 2px 8px;
    }
    .char-counter {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .char-counter.warn { color: var(--yellow); }
    .char-counter.over { color: var(--red); }

    /* Add message btn */
    .add-message-btn {
      background: var(--brand);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      margin: 8px 12px;
      padding: 9px 16px;
      transition: background .1s, transform .1s;
      flex-shrink: 0;
    }
    .add-message-btn:hover { background: #4752c4; }
    .add-message-btn:active { transform: scale(0.97); }

    /* === Preview panel === */
    .panel-preview {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Channel header */
    .channel-header {
      align-items: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      gap: 8px;
      padding: 12px 16px;
    }
    .channel-header.hidden { display: none; }
    .channel-icon { color: var(--text-muted); font-size: 22px; }
    .channel-name { font-size: 15px; font-weight: 700; }
    .announcement-badge {
      background: var(--brand);
      border-radius: 3px;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      padding: 1px 5px;
      text-transform: uppercase;
    }

    /* Messages container */
    .messages-container {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      padding: 16px;
    }

    /* Discord message */
    .dc-message {
      border-radius: 4px;
      display: flex;
      gap: 16px;
      padding: 4px 8px;
    }
    .dc-message:hover { background: var(--bg-hover); }

    .dc-avatar {
      align-items: center;
      border-radius: 50%;
      color: #fff;
      display: flex;
      flex-shrink: 0;
      font-size: 17px;
      font-weight: 700;
      height: 40px;
      justify-content: center;
      margin-top: 2px;
      width: 40px;
    }
    .dc-msg-content { flex: 1; min-width: 0; }
    .dc-msg-header {
      align-items: baseline;
      display: flex;
      gap: 8px;
      margin-bottom: 2px;
    }
    .dc-username { font-size: 15px; font-weight: 500; }
    .dc-msg-ts { color: var(--text-muted); font-size: 11px; }
    .dc-msg-body { font-size: 15px; line-height: 1.375; word-break: break-word; }
    .dc-msg-body > *:first-child { margin-top: 0; }

    /* === Markdown rendered styles === */
    .dc-msg-body strong { font-weight: 700; }
    .dc-msg-body em { font-style: italic; }
    .dc-msg-body u { text-decoration: underline; }
    .dc-msg-body s { text-decoration: line-through; }

    .dc-h1 {
      font-size: 1.5em;
      font-weight: 700;
      line-height: 1.25;
      margin: 8px 0 4px;
    }
    .dc-h2 { font-size: 1.25em; font-weight: 700; line-height: 1.25; margin: 6px 0 4px; }
    .dc-h3 { font-size: 1em; font-weight: 700; line-height: 1.25; margin: 4px 0; }
    .dc-subtext { color: var(--text-muted); font-size: 0.8em; display: block; }

    .dc-blockquote {
      display: flex;
      gap: 0;
      margin: 4px 0;
    }
    .dc-quote-bar {
      background: var(--quote-bar);
      border-radius: 4px;
      flex-shrink: 0;
      min-height: 100%;
      width: 4px;
    }
    .dc-quote-content { color: var(--text-normal); padding: 4px 12px; }

    .dc-ul, .dc-ol { margin: 4px 0; padding-left: 20px; }
    .dc-ul li, .dc-ol li { margin: 2px 0; }

    code.dc-inline-code {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 3px;
      font-family: Consolas, 'Andale Mono', 'Courier New', monospace;
      font-size: .875em;
      padding: 1px 4px;
    }
    .dc-codeblock {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      margin: 4px 0;
      overflow: hidden;
    }
    .dc-codeblock-lang {
      border-bottom: 1px solid var(--code-border);
      color: var(--text-muted);
      font-family: Consolas, monospace;
      font-size: 11px;
      letter-spacing: .5px;
      padding: 4px 12px;
      text-transform: uppercase;
    }
    .dc-codeblock pre {
      font-family: Consolas, 'Andale Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      overflow-x: auto;
      padding: 8px 12px;
    }
    .dc-codeblock pre code { background: none; border: none; padding: 0; font-size: inherit; }

    .dc-mention {
      background: var(--mention-bg);
      border-radius: 3px;
      color: var(--mention-fg);
      cursor: pointer;
      font-weight: 500;
      padding: 0 2px;
    }
    .dc-mention:hover { background: rgba(88,101,242,.3); }
    .dc-channel-mention {
      background: var(--mention-bg);
      border-radius: 3px;
      color: var(--mention-fg);
      cursor: pointer;
      padding: 0 2px;
    }
    .dc-channel-mention:hover { background: rgba(88,101,242,.3); }

    .dc-spoiler {
      background: var(--spoiler-bg);
      border-radius: 3px;
      color: transparent;
      cursor: pointer;
      padding: 0 2px;
      transition: color .15s, background .15s;
      user-select: none;
    }
    .dc-spoiler.revealed { background: rgba(0,0,0,.15); color: inherit; cursor: default; }

    .dc-ts-pill {
      background: var(--bg-input);
      border-radius: 3px;
      font-size: .875em;
      padding: 0 4px;
    }

    .dc-link { color: var(--text-link); text-decoration: none; }
    .dc-link:hover { text-decoration: underline; }

    /* OGP card */
    .ogp-card {
      background: var(--bg-secondary);
      border-left: 4px solid var(--bg-tertiary);
      border-radius: 0 4px 4px 0;
      display: flex;
      margin-top: 8px;
      max-width: 520px;
      overflow: hidden;
    }
    .ogp-card-body { flex: 1; min-width: 0; padding: 12px; }
    .ogp-site { color: var(--text-muted); font-size: 12px; margin-bottom: 4px; }
    .ogp-title {
      color: var(--text-link);
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      text-decoration: none;
    }
    .ogp-title:hover { text-decoration: underline; }
    .ogp-desc {
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      color: var(--text-muted);
      display: -webkit-box;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }
    .ogp-image { display: block; min-width: 100px; object-fit: cover; width: 100px; }

    /* Discord embed (approx) */
    .dc-embed {
      --embed-color: #4e5058;
      background: var(--bg-secondary);
      border-left: 4px solid var(--embed-color);
      border-radius: 4px;
      margin-top: 8px;
      max-width: 520px;
      overflow: hidden;
    }
    .dc-embed-inner { display: flex; gap: 12px; padding: 12px; }
    .dc-embed-content { flex: 1; min-width: 0; }
    .dc-embed-author { color: var(--text-normal); font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .dc-embed-title {
      color: var(--text-link);
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      text-decoration: none;
      word-break: break-word;
    }
    .dc-embed-title:hover { text-decoration: underline; }
    .dc-embed-desc { color: var(--text-normal); font-size: 13px; line-height: 1.35; white-space: pre-wrap; word-break: break-word; }
    .dc-embed-fields {
      display: grid;
      gap: 8px 12px;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      margin-top: 10px;
    }
    .dc-embed-field { grid-column: span 12; min-width: 0; }
    .dc-embed-field.inline { grid-column: span 6; }
    .dc-embed-field-name { color: var(--text-normal); font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .dc-embed-field-value { color: var(--text-normal); font-size: 13px; line-height: 1.35; white-space: pre-wrap; word-break: break-word; }
    .dc-embed-footer { color: var(--text-muted); font-size: 11px; margin-top: 10px; }
    .dc-embed-thumb {
      border-radius: 4px;
      flex: 0 0 80px;
      height: 80px;
      object-fit: cover;
      width: 80px;
    }
    .dc-embed-image {
      border-top: 1px solid var(--border);
      display: block;
      max-height: 300px;
      object-fit: cover;
      width: 100%;
    }

    /* Embed editor (left panel) */
    .embed-editor {
      border-top: 1px solid var(--border);
      margin-top: 8px;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .embed-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .embed-input {
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-normal);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      padding: 4px 8px;
    }
    .embed-input:focus { border-color: var(--brand); }
    .embed-input.full { width: 100%; }
    .embed-color { width: 34px; height: 28px; border: none; border-radius: 50%; padding: 0; background: none; }
    .embed-small { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
    .embed-fields-editor { display: flex; flex-direction: column; gap: 6px; }
    .embed-field-editor {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0,0,0,0.08);
    }
    .embed-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Emoji picker */
    .emoji-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 6px 8px;
    }
    .emoji-btn:hover { color: var(--text-normal); border-color: rgba(88,101,242,.6); }
    .emoji-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      z-index: 50;
    }
    .emoji-backdrop.open { display: block; }
    .emoji-picker {
      position: fixed;
      z-index: 60;
      width: min(420px, calc(100vw - 24px));
      max-height: min(520px, calc(100vh - 24px));
      left: 12px;
      bottom: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      display: none;
      overflow: hidden;
    }
    .emoji-picker.open { display: flex; flex-direction: column; }
    .emoji-picker-header { padding: 10px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .emoji-search {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-normal);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      padding: 7px 10px;
    }
    .emoji-search:focus { border-color: var(--brand); }
    .emoji-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
    }
    .emoji-close:hover { color: var(--text-normal); border-color: rgba(88,101,242,.6); }
    .emoji-grid {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 6px;
      overflow: auto;
    }
    .emoji-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      height: 32px;
      width: 32px;
      display: grid;
      place-items: center;
    }
    .emoji-item:hover { border-color: rgba(88,101,242,.6); background: rgba(88,101,242,0.18); }

    /* Empty preview hint */
    .preview-empty {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      font-size: 13px;
      gap: 8px;
      height: 100%;
      justify-content: center;
      text-align: center;
    }
    .preview-empty-icon { font-size: 48px; opacity: .4; }

    /* === Timestamp tab === */
    #tab-timestamp {
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 28px 24px;
    }
    .ts-tool { margin: 0 auto; max-width: 620px; width: 100%; }
    .ts-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .ts-inputs {
      align-items: flex-end;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .ts-field { display: flex; flex-direction: column; gap: 4px; }
    .ts-field label {
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .ts-dt-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-normal);
      color-scheme: dark;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      padding: 6px 10px;
    }
    .ts-dt-input:focus { border-color: var(--brand); }
    .ts-tz-select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-normal);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      max-width: 260px;
      outline: none;
      padding: 6px 10px;
    }
    .ts-now-btn {
      background: var(--brand);
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
    }
    .ts-now-btn:hover { filter: brightness(1.1); }
    .ts-formats { display: flex; flex-direction: column; gap: 8px; }
    .ts-format-row {
      align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      gap: 10px;
      padding: 10px 14px;
    }
    .ts-format-code {
      color: var(--text-muted);
      font-family: Consolas, monospace;
      font-size: 13px;
      min-width: 160px;
    }
    .ts-format-preview { flex: 1; font-size: 14px; }
    .ts-copy-btn {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      transition: color .1s, border-color .1s;
      white-space: nowrap;
    }
    .ts-copy-btn:hover { border-color: var(--brand); color: var(--text-normal); }
    .ts-copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* === Scrollbar === */
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* === Prism tomorrow theme === */
    code[class*=language-],pre[class*=language-]{color:#ccc;background:0 0;font-family:Consolas,Monaco,'Andale Mono','Ubuntu Mono',monospace;font-size:1em;text-align:left;white-space:pre;word-spacing:normal;word-break:normal;word-wrap:normal;line-height:1.5;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-hyphens:none;-moz-hyphens:none;-ms-hyphens:none;hyphens:none}pre[class*=language-]{padding:1em;margin:.5em 0;overflow:auto}:not(pre)>code[class*=language-],pre[class*=language-]{background:#2d2d2d}:not(pre)>code[class*=language-]{padding:.1em;border-radius:.3em;white-space:normal}.token.block-comment,.token.cdata,.token.comment,.token.doctype,.token.prolog{color:#999}.token.punctuation{color:#ccc}.token.attr-name,.token.deleted,.token.namespace,.token.tag{color:#e2777a}.token.function-name{color:#6196cc}.token.boolean,.token.function,.token.number{color:#f08d49}.token.class-name,.token.constant,.token.property,.token.symbol{color:#f8c555}.token.atrule,.token.builtin,.token.important,.token.keyword,.token.selector{color:#cc99cd}.token.attr-value,.token.char,.token.regex,.token.string,.token.variable{color:#7ec699}.token.entity,.token.operator,.token.url{color:#67cdcc}.token.bold,.token.important{font-weight:700}.token.italic{font-style:italic}.token.entity{cursor:help}.token.inserted{color:green}

    /* === Mobile === */
    @media (max-width: 680px) {
      html, body { overflow: auto; }
      #app { height: auto; min-height: 100%; }
      #tab-preview { flex-direction: column; }
      .col-resizer { display: none; }
      .panel-input { flex: 0 0 auto; width: 100%; min-width: 0; border-bottom: 1px solid var(--border); max-height: 55vh; }
      .panel-preview { min-height: 300px; }
      .tab-content.active { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Tab navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="preview">📝 Preview</button>
    <button class="tab-btn" data-tab="timestamp">🕐 Timestamp</button>
    <div class="tab-nav-spacer"></div>
    <button class="lang-toggle" id="lang-btn" title="Switch language">
      <span class="lang-opt" data-l="ja">JA</span>
      <span class="lang-opt" data-l="en">EN</span>
    </button>
  </nav>

  <!-- Preview tab -->
  <div id="tab-preview" class="tab-content active">

    <!-- Left: input panel -->
    <div class="panel-input">
      <div class="panel-input-header">
        <div class="settings-row">
          <span class="settings-label" data-i18n="channel">チャンネル</span>
          <input type="text" id="channel-name-input" class="settings-input" value="general" placeholder="general">
        </div>
        <div class="settings-row">
          <label class="toggle-wrap">
            <input type="checkbox" id="toggle-ogp" checked>
            <span data-i18n="ogpPreview">OGPプレビュー</span>
          </label>
        </div>
      </div>

      <button class="add-message-btn" id="add-message-btn" data-i18n="addMessage">＋ メッセージを追加</button>
      <div class="message-list" id="message-list"></div>
    </div>

    <div class="col-resizer" id="col-resizer" role="separator" aria-orientation="vertical" aria-label="Resize columns"></div>

    <!-- Right: preview panel -->
    <div class="panel-preview">
      <div class="channel-header" id="channel-header">
        <span class="channel-icon" id="channel-icon">#</span>
        <span class="channel-name" id="channel-name-display">general</span>
      </div>
      <div class="messages-container" id="messages-container">
        <div class="preview-empty">
          <div class="preview-empty-icon">💬</div>
          <div data-i18n="emptyHint">メッセージを入力するとプレビューが表示されます</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Timestamp tab -->
  <div id="tab-timestamp" class="tab-content">
    <div class="ts-tool">
      <div class="ts-title">⏱ Timestamp Converter</div>
      <div class="ts-inputs">
        <div class="ts-field">
          <label data-i18n="datetime">日時</label>
          <input type="datetime-local" id="ts-datetime" class="ts-dt-input">
        </div>
        <div class="ts-field">
          <label data-i18n="timezone">タイムゾーン</label>
          <select id="ts-timezone" class="ts-tz-select"></select>
        </div>
        <button class="ts-now-btn" id="ts-now-btn" data-i18n="now">今すぐ</button>
      </div>
      <div class="ts-formats" id="ts-formats"></div>
    </div>
  </div>

</div>

    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function initColumnResizer() {
  const container = document.getElementById('tab-preview');
  const left = container ? container.querySelector('.panel-input') : null;
  const resizer = document.getElementById('col-resizer');
  if (!container || !left || !resizer) return;

  const mq = window.matchMedia('(max-width: 680px)');
  const key = 'discorddraft:inputPanelWidthPx';

  const getBounds = () => {
    const total = container.getBoundingClientRect().width;
    const resizerW = resizer.getBoundingClientRect().width || 6;
    const minLeft = 280;
    const minRight = 320;
    const maxLeft = Math.max(minLeft, total - minRight - resizerW);
    return { minLeft, maxLeft };
  };

  const setLeftPx = (px) => {
    const { minLeft, maxLeft } = getBounds();
    const clamped = clamp(Math.round(px), minLeft, maxLeft);
    container.style.setProperty('--input-panel-width', `${clamped}px`);
    return clamped;
  };

  const applySaved = () => {
    const raw = localStorage.getItem(key);
    const px = parseInt(raw || '', 10);
    if (!Number.isFinite(px) || px <= 0) return;
    setLeftPx(px);
  };

  applySaved();

  resizer.addEventListener('pointerdown', (e) => {
    if (mq.matches) return;
    if (e.button !== 0) return;
    e.preventDefault();

    const startX = e.clientX;
    const startW = left.getBoundingClientRect().width;
    document.body.classList.add('resizing');
    resizer.setPointerCapture(e.pointerId);

    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      setLeftPx(startW + dx);
    };
    const onUp = () => {
      document.body.classList.remove('resizing');
      resizer.removeEventListener('pointermove', onMove);
      resizer.removeEventListener('pointerup', onUp);
      resizer.removeEventListener('pointercancel', onUp);
      const w = left.getBoundingClientRect().width;
      localStorage.setItem(key, String(Math.round(w)));
    };

    resizer.addEventListener('pointermove', onMove);
    resizer.addEventListener('pointerup', onUp);
    resizer.addEventListener('pointercancel', onUp);
  });

  // Keyboard resize when focused (optional, but helps accessibility).
  resizer.tabIndex = 0;
  resizer.addEventListener('keydown', (e) => {
    if (mq.matches) return;
    const step = e.shiftKey ? 40 : 20;
    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    e.preventDefault();
    const cur = left.getBoundingClientRect().width;
    const next = setLeftPx(cur + (e.key === 'ArrowRight' ? step : -step));
    localStorage.setItem(key, String(next));
  });

  window.addEventListener('resize', () => {
    if (mq.matches) return;
    applySaved();
  });
}

function insertTextAtCursor(ta, text) {
  if (!ta) return;
  const start = ta.selectionStart ?? ta.value.length;
  const end = ta.selectionEnd ?? ta.value.length;
  const before = ta.value.slice(0, start);
  const after = ta.value.slice(end);
  ta.value = before + text + after;
  const pos = start + text.length;
  ta.setSelectionRange(pos, pos);
}

function renderEmojiGrid(query) {
  if (!emojiGridEl) return;
  const q = (query || '').trim().toLowerCase();
  emojiGridEl.innerHTML = '';
  const list = q
    ? EMOJI_DATA.filter(([e, name]) => name.includes(q))
    : EMOJI_DATA;
  list.forEach(([emoji, name]) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'emoji-item';
    btn.title = name;
    btn.textContent = emoji;
    btn.addEventListener('click', () => {
      if (!emojiTargetTa) return;
      insertTextAtCursor(emojiTargetTa, emoji);
      emojiTargetTa.dispatchEvent(new Event('input', { bubbles: true }));
      emojiTargetTa.focus();
      closeEmojiPicker();
    });
    emojiGridEl.appendChild(btn);
  });
}

function positionEmojiPickerNear(anchorEl) {
  if (!emojiPickerEl || !anchorEl) return;
  const margin = 12;
  const gap = 8;
  const r = anchorEl.getBoundingClientRect();

  // Ensure we can measure picker.
  const pr = emojiPickerEl.getBoundingClientRect();
  const pw = pr.width || 420;
  const ph = pr.height || 520;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = clamp(r.left, margin, vw - margin - pw);
  let top = r.bottom + gap;

  // Flip above if it would go off-screen below.
  if (top + ph > vh - margin) {
    top = r.top - gap - ph;
  }
  top = clamp(top, margin, vh - margin - ph);

  emojiPickerEl.style.left = `${Math.round(left)}px`;
  emojiPickerEl.style.top = `${Math.round(top)}px`;
  emojiPickerEl.style.right = 'auto';
  emojiPickerEl.style.bottom = 'auto';
}

function openEmojiPicker(targetTextarea, anchorEl) {
  emojiTargetTa = targetTextarea;
  emojiAnchorEl = anchorEl || targetTextarea;
  if (!emojiPickerEl) initEmojiPicker();
  emojiBackdropEl.classList.add('open');
  emojiPickerEl.classList.add('open');
  emojiSearchEl.value = '';
  renderEmojiGrid('');
  requestAnimationFrame(() => positionEmojiPickerNear(emojiAnchorEl));
  setTimeout(() => emojiSearchEl.focus(), 0);
}

function closeEmojiPicker() {
  if (!emojiPickerEl) return;
  emojiBackdropEl.classList.remove('open');
  emojiPickerEl.classList.remove('open');
  emojiTargetTa = null;
  emojiAnchorEl = null;
}

function initEmojiPicker() {
  if (emojiPickerEl) return;
  emojiBackdropEl = document.createElement('div');
  emojiBackdropEl.className = 'emoji-backdrop';
  emojiBackdropEl.addEventListener('click', closeEmojiPicker);

  emojiPickerEl = document.createElement('div');
  emojiPickerEl.className = 'emoji-picker';
  emojiPickerEl.innerHTML = `
    <div class="emoji-picker-header">
      <input class="emoji-search" type="text" placeholder="Search emoji...">
      <button class="emoji-close" type="button">Close</button>
    </div>
    <div class="emoji-grid"></div>
  `;

  emojiSearchEl = emojiPickerEl.querySelector('.emoji-search');
  emojiGridEl = emojiPickerEl.querySelector('.emoji-grid');
  emojiPickerEl.querySelector('.emoji-close').addEventListener('click', closeEmojiPicker);
  emojiSearchEl.addEventListener('input', () => renderEmojiGrid(emojiSearchEl.value));

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!emojiPickerEl.classList.contains('open')) return;
    closeEmojiPicker();
  });

  document.body.appendChild(emojiBackdropEl);
  document.body.appendChild(emojiPickerEl);
  renderEmojiGrid('');
}

function formatMsgTime() {
  const now = new Date();
  return `今日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function avatarInitial(name) {
  return (name || '?').trim().charAt(0).toUpperCase();
}
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// ---- Markdown parser ----

function renderCodeBlock(lang, code) {
  const safeCode = escHtml(code);
  const grammar = Prism.languages[lang] || Prism.languages[lang.toLowerCase()];
  let highlighted;
  if (grammar) {
    try { highlighted = Prism.highlight(code, grammar, lang); }
    catch(e) { highlighted = safeCode; }
  } else {
    highlighted = safeCode;
  }
  const langLabel = lang ? `<div class="dc-codeblock-lang">${escHtml(lang)}</div>` : '';
  return `<div class="dc-codeblock">${langLabel}<pre><code class="language-${escAttr(lang)}">${highlighted}</code></pre></div>`;
}

function renderDiscordTimestamp(unix, fmt) {
  const date = new Date(unix * 1000);
  const locale = 'ja-JP';
  let text;
  if (fmt === 'R') {
    text = formatRelative(unix);
  } else {
    const opts = {
      't': { hour: '2-digit', minute: '2-digit' },
      'T': { hour: '2-digit', minute: '2-digit', second: '2-digit' },
      'd': { year: 'numeric', month: '2-digit', day: '2-digit' },
      'D': { year: 'numeric', month: 'long', day: 'numeric' },
      'f': { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' },
      'F': { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' },
    }[fmt] || { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    try { text = new Intl.DateTimeFormat(locale, opts).format(date); }
    catch(e) { text = date.toLocaleString(); }
  }
  return `<span class="dc-ts-pill" title="${escAttr(date.toISOString())}">${escHtml(text)}</span>`;
}

function formatRelative(unix) {
  const diffSec = Math.round(Date.now() / 1000 - unix);
  const abs = Math.abs(diffSec);
  const future = diffSec < 0;
  let val, unit;
  if (abs < 45)       { val = abs; unit = '秒'; }
  else if (abs < 2700)  { val = Math.round(abs/60);  unit = '分'; }
  else if (abs < 64800) { val = Math.round(abs/3600); unit = '時間'; }
  else if (abs < 172800){ val = Math.round(abs/86400); unit = '日'; }
  else if (abs < 2678400){ val = Math.round(abs/86400/30); unit = 'ヶ月'; }
  else                  { val = Math.round(abs/86400/365); unit = '年'; }
  return future ? `${val}${unit}後` : `${val}${unit}前`;
}

function parseInline(text, suppressedOgpUrls, ogpUrls) {
  const tokens = [];
  function protect(html) {
    tokens.push(html);
    return `\x00${tokens.length - 1}\x00`;
  }

  function renderInlineLabel(labelText) {
    // Render basic inline styles inside markdown link labels, without creating nested links.
    // Escape first to avoid HTML injection, then apply formatting markers.
    let s = escHtml(labelText);
    s = s.replace(/`([^`\n]+)`/g, (_, code) => `<code class="dc-inline-code">${code}</code>`);
    s = s.replace(/\|\|(.+?)\|\|/gs, (_, c) => `<span class="dc-spoiler" onclick="this.classList.toggle('revealed')">${c}</span>`);
    s = s.replace(/\*\*\*(.+?)\*\*\*/gs, (_, c) => `<strong><em>${c}</em></strong>`);
    s = s.replace(/\*\*(.+?)\*\*/gs, (_, c) => `<strong>${c}</strong>`);
    s = s.replace(/___(.+?)___/gs, (_, c) => `<u><em>${c}</em></u>`);
    s = s.replace(/__(.+?)__/gs, (_, c) => `<u>${c}</u>`);
    s = s.replace(/\*([^*\n]+)\*/g, (_, c) => `<em>${c}</em>`);
    s = s.replace(/(?<![\\w])_([^_\n]+)_(?![\\w])/g, (_, c) => `<em>${c}</em>`);
    s = s.replace(/~~(.+?)~~/gs, (_, c) => `<s>${c}</s>`);
    s = s.replace(/@(\w+)/g, (_, n) => `<span class="dc-mention">@${n}</span>`);
    s = s.replace(/#([\w-]+)/g, (_, n) => `<span class="dc-channel-mention">#${n}</span>`);
    return s;
  }

  // 1. Inline code
  text = text.replace(/`([^`\n]+)`/g, (_, code) =>
    protect(`<code class="dc-inline-code">${escHtml(code)}</code>`)
  );

  // 2. Discord timestamps (before HTML escape)
  text = text.replace(/<t:(\d+)(?::([tTdDfFR]))?>/g, (_, ts, fmt) =>
    protect(renderDiscordTimestamp(parseInt(ts), fmt || 'f'))
  );

  // 3. Markdown links: [text](url) / [text](<url>)
  // Note: Discord doesn't support masked links in normal messages, but this tool does.
  text = text.replace(/\[\s*([^\]\n]+?)\s*\]\(\s*(<)?(https?:\/\/[^\s>]+)(?:>)?\s*\)/g, (_, label, angle, url) => {
    const suppress = !!angle;
    if (suppress) suppressedOgpUrls.add(url);
    else ogpUrls.push(url);
    const cls = suppress ? 'dc-link' : 'dc-link ogp-trigger';
    const data = suppress ? '' : ` data-url="${escAttr(url)}"`;
    const labelHtml = renderInlineLabel(String(label || '').trim());
    return protect(`<a class="${cls}" href="${escAttr(url)}" target="_blank" rel="noopener noreferrer"${data}>${labelHtml}</a>`);
  });

  // 4. <URL> suppress-OGP links
  text = text.replace(/<(https?:\/\/[^\s>]+)>/g, (_, url) => {
    suppressedOgpUrls.add(url);
    return protect(`<a class="dc-link" href="${escAttr(url)}" target="_blank" rel="noopener noreferrer">${escHtml(url)}</a>`);
  });

  // 5. Plain URLs (collect for OGP)
  text = text.replace(/https?:\/\/[^\s<>"'`]+/g, (url) => {
    // trim trailing punctuation
    url = url.replace(/[.,;!?)]+$/, '');
    ogpUrls.push(url);
    return protect(`<a class="dc-link ogp-trigger" href="${escAttr(url)}" target="_blank" rel="noopener noreferrer" data-url="${escAttr(url)}">${escHtml(url)}</a>`);
  });

  // 6. Escape remaining HTML
  text = escHtml(text);

  // 7. Spoiler
  text = text.replace(/\|\|(.+?)\|\|/gs, (_, c) =>
    protect(`<span class="dc-spoiler" onclick="this.classList.toggle('revealed')">${c}</span>`)
  );

  // 8. Bold+Italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/gs, (_, c) => protect(`<strong><em>${c}</em></strong>`));

  // 9. Bold
  text = text.replace(/\*\*(.+?)\*\*/gs, (_, c) => protect(`<strong>${c}</strong>`));

  // 10. Underline+Italic
  text = text.replace(/___(.+?)___/gs, (_, c) => protect(`<u><em>${c}</em></u>`));

  // 11. Underline
  text = text.replace(/__(.+?)__/gs, (_, c) => protect(`<u>${c}</u>`));

  // 12. Italic *
  text = text.replace(/\*([^*\n]+)\*/g, (_, c) => protect(`<em>${c}</em>`));

  // 13. Italic _ (word boundary)
  text = text.replace(/(?<![\\w])_([^_\n]+)_(?![\\w])/g, (_, c) => protect(`<em>${c}</em>`));

  // 14. Strikethrough
  text = text.replace(/~~(.+?)~~/gs, (_, c) => protect(`<s>${c}</s>`));

  // 15. @mentions
  text = text.replace(/@(\w+)/g, (_, n) => protect(`<span class="dc-mention">@${n}</span>`));

  // 16. #channels
  text = text.replace(/#([\w-]+)/g, (_, n) => protect(`<span class="dc-channel-mention">#${n}</span>`));

  // Restore tokens
  text = text.replace(/\x00(\d+)\x00/g, (_, i) => tokens[+i]);
  return text;
}

function parseMarkdown(text) {
  // Extract code blocks first
  const codeBlocks = [];
  const CB = '\x01';
  text = text.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang: lang.trim(), code: code.replace(/\n$/, '') });
    return `${CB}${codeBlocks.length - 1}${CB}`;
  });

  const suppressedOgpUrls = new Set();
  const allOgpUrls = [];

  function inline(s) {
    return parseInline(s, suppressedOgpUrls, allOgpUrls);
  }

  const lines = text.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Code block placeholder
    const cbm = line.match(/^\x01(\d+)\x01$/);
    if (cbm) {
      const { lang, code } = codeBlocks[+cbm[1]];
      html += renderCodeBlock(lang, code);
      i++; continue;
    }

    // Multi-line blockquote >>>
    if (line.startsWith('>>> ')) {
      const qlines = [line.slice(4)];
      i++;
      while (i < lines.length) { qlines.push(lines[i]); i++; }
      html += `<div class="dc-blockquote"><div class="dc-quote-bar"></div><div class="dc-quote-content">${inline(qlines.join('\n'))}</div></div>`;
      continue;
    }

    // Single blockquote >
    if (line.startsWith('> ')) {
      html += `<div class="dc-blockquote"><div class="dc-quote-bar"></div><div class="dc-quote-content">${inline(line.slice(2))}</div></div>`;
      i++; continue;
    }

    // Headings
    if (line.startsWith('### ')) { html += `<h3 class="dc-h3">${inline(line.slice(4))}</h3>`; i++; continue; }
    if (line.startsWith('## '))  { html += `<h2 class="dc-h2">${inline(line.slice(3))}</h2>`; i++; continue; }
    if (line.startsWith('# '))   { html += `<h1 class="dc-h1">${inline(line.slice(2))}</h1>`; i++; continue; }

    // Subtext -#
    if (line.startsWith('-# ')) {
      html += `<span class="dc-subtext">${inline(line.slice(3))}</span><br>`;
      i++; continue;
    }

    // Unordered list (with nesting via 2-space indent)
    if (/^( {2})*[-*] /.test(line)) {
      function buildUl(lines, startIdx, baseIndent) {
        let idx = startIdx, out = '<ul class="dc-ul">';
        while (idx < lines.length) {
          const m = lines[idx].match(/^( {2})*[-*] /);
          if (!m) break;
          const indent = (lines[idx].match(/^( *)/)[1].length / 2);
          if (indent < baseIndent) break;
          if (indent > baseIndent) { const [sub, ni] = buildUl(lines, idx, indent); out += sub; idx = ni; continue; }
          out += `<li>${inline(lines[idx].replace(/^( {2})*[-*] /, ''))}</li>`;
          idx++;
        }
        return [out + '</ul>', idx];
      }
      const baseIndent = (line.match(/^( *)/)[1].length / 2);
      const [listHtml, ni] = buildUl(lines, i, baseIndent);
      html += listHtml;
      i = ni;
      continue;
    }

    // Ordered list (with nesting via 2-space indent)
    if (/^( {2})*\d+\. /.test(line)) {
      function buildOl(lines, startIdx, baseIndent) {
        let idx = startIdx, out = '';
        const startNum = parseInt(lines[startIdx].replace(/^( {2})*/, '').match(/^(\d+)/)[1]);
        out = `<ol class="dc-ol" start="${startNum}">`;
        while (idx < lines.length) {
          const m = lines[idx].match(/^( {2})*\d+\. /);
          if (!m) break;
          const indent = (lines[idx].match(/^( *)/)[1].length / 2);
          if (indent < baseIndent) break;
          if (indent > baseIndent) { const [sub, ni] = buildOl(lines, idx, indent); out += sub; idx = ni; continue; }
          out += `<li>${inline(lines[idx].replace(/^( {2})*\d+\. /, ''))}</li>`;
          idx++;
        }
        return [out + '</ol>', idx];
      }
      const baseIndent = (line.match(/^( *)/)[1].length / 2);
      const [listHtml, ni] = buildOl(lines, i, baseIndent);
      html += listHtml;
      i = ni;
      continue;
    }

    // Empty line
    if (line.trim() === '') { html += '<br>'; i++; continue; }

    // Normal text
    html += `<div>${inline(line)}</div>`;
    i++;
  }

  return {
    html,
    ogpUrls: allOgpUrls.filter(u => !suppressedOgpUrls.has(u)),
  };
}

// ---- OGP ----
async function fetchOGP(url) {
  const cached = getOgpCacheEntry(url);
  if (cached) {
    console.debug('[OGP] cache hit:', url, cached.value ? 'OK' : 'null');
    return cached.value;
  }

  const rewritten = rewriteUrlForOgpFetch(url);
  if (rewritten.rewritten) {
    console.log('[OGP] fetching (rewritten):', url, '→', rewritten.fetchUrl, `(${rewritten.provider})`);
  } else {
    console.log('[OGP] fetching:', url);
  }

  const baseUrl = (() => { try { return new URL(rewritten.fetchUrl).href; } catch { return rewritten.fetchUrl; } })();

  const tryParse = (htmlStr) => {
    if (!htmlStr) return null;
    const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
    const g = (p) => {
      const el = doc.querySelector(`meta[property="${p}"],meta[name="${p}"]`);
      return el ? (el.getAttribute('content') || '').trim() : '';
    };

    const rawTitle = g('og:title') || g('twitter:title') || (doc.title || '').trim();
    const rawDesc = g('og:description') || g('twitter:description') || g('description');
    const rawImage =
      g('og:image') ||
      g('og:image:secure_url') ||
      g('twitter:image') ||
      g('twitter:image:src');
    const rawUrl = g('og:url') || baseUrl;

    const resolvedUrl = resolveMaybeRelativeUrl(rawUrl, baseUrl) || baseUrl;
    const resolvedImage = resolveMaybeRelativeUrl(rawImage, baseUrl);

    let site = g('og:site_name');
    if (!site) {
      try { site = (new URL(resolvedUrl)).hostname; } catch { site = ''; }
    }

    const result = {
      title: rawTitle,
      desc: rawDesc,
      image: resolvedImage,
      site,
      // Prefer original URL for the clickable title, even if we fetched via an embed helper domain.
      url: rewritten.canonicalUrl || resolvedUrl,
    };

    // If we got nothing usable, treat it as "no-ogp" (but only after all proxies are tried).
    if (!result.title && !result.image) return null;
    return result;
  };

  // Try direct fetch (works only when CORS allows), then fall back to public proxies.
  let lastError = null;
  for (const proxy of OGP_PROXIES) {
    const fetchUrl = proxy.build(rewritten.fetchUrl);
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000);
      const resp = await fetch(fetchUrl, { signal: controller.signal });
      clearTimeout(timer);

      if (!resp.ok) {
        // Don't negative-cache hard on transient proxy issues; move on to the next proxy.
        console.warn('[OGP] fetch HTTP error:', resp.status, 'via', proxy.name, url);
        lastError = new Error(`HTTP ${resp.status}`);
        continue;
      }

      const htmlStr = await resp.text();
      console.debug('[OGP] response length:', htmlStr.length, 'chars via', proxy.name, 'for', url);
      const parsed = tryParse(htmlStr);
      if (parsed) {
        console.log('[OGP] parsed:', { title: parsed.title, image: parsed.image, site: parsed.site, via: proxy.name });
        setOgpCache(url, parsed, OGP_CACHE_TTL_OK_MS);
        return parsed;
      }

      // If this proxy returns non-empty HTML but no title/image, try the next proxy.
      if (htmlStr) {
        console.warn('[OGP] no title/image via', proxy.name, 'for', url);
      } else {
        console.warn('[OGP] empty response via', proxy.name, 'for', url);
        lastError = new Error('empty response');
      }
    } catch (e) {
      if (e && e.name === 'AbortError') {
        console.warn('[OGP] timeout (10s) via', proxy.name, 'for', url);
        lastError = e;
        continue;
      }
      console.warn('[OGP] fetch error via', proxy.name, ':', e && e.name, e && e.message, url);
      lastError = e;
      continue;
    }
  }

  // If everything failed, cache null briefly to avoid spamming while typing.
  const ttl = (lastError || isVolatileOgpHost(rewritten.fetchUrl) || isVolatileOgpHost(url))
    ? OGP_CACHE_TTL_ERROR_MS
    : OGP_CACHE_TTL_NO_OGP_MS;
  setOgpCache(url, null, ttl);
  return null;
}

function renderOGPCard(ogp, url) {
  if (!ogp) return '';
  const directImg = ogp.image ? ogp.image : '';
  const proxyImg = directImg ? buildOgpProxyUrl(directImg) : '';
  const imgHtml = directImg
    ? `<img class="ogp-image" src="${escAttr(directImg)}" data-proxy="${escAttr(proxyImg)}" alt="" loading="lazy"
         onerror="if(this.dataset.proxy){this.src=this.dataset.proxy;this.dataset.proxy='';}else{this.style.display='none';}">`
    : '';
  return `<div class="ogp-card">
    <div class="ogp-card-body">
      <div class="ogp-site">${escHtml(ogp.site)}</div>
      <a class="ogp-title" href="${escAttr(ogp.url)}" target="_blank" rel="noopener noreferrer">${escHtml(ogp.title)}</a>
      ${ogp.desc ? `<div class="ogp-desc">${escHtml(ogp.desc)}</div>` : ''}
    </div>
    ${imgHtml}
  </div>`;
}

function hasEmbedContent(e) {
  if (!e || !e.enabled) return false;
  return !!(
    (e.author || '').trim() ||
    (e.title || '').trim() ||
    (e.description || '').trim() ||
    (e.thumbnail || '').trim() ||
    (e.image || '').trim() ||
    (e.footer || '').trim() ||
    (e.fields && e.fields.some(f => (f.name || '').trim() || (f.value || '').trim()))
  );
}

function renderEmbed(e) {
  if (!hasEmbedContent(e)) return '';
  const color = (e.color || '#4e5058').trim();
  const title = (e.title || '').trim();
  const url = (e.url || '').trim();
  const author = (e.author || '').trim();
  const desc = (e.description || '').trim();
  const thumb = (e.thumbnail || '').trim();
  const image = (e.image || '').trim();
  const footer = (e.footer || '').trim();

  const titleHtml = title
    ? (url
      ? `<a class="dc-embed-title" href="${escAttr(url)}" target="_blank" rel="noopener noreferrer">${escHtml(title)}</a>`
      : `<span class="dc-embed-title">${escHtml(title)}</span>`)
    : '';

  const fields = (e.fields || [])
    .filter(f => (f.name || '').trim() || (f.value || '').trim())
    .map(f => `
      <div class="dc-embed-field ${f.inline ? 'inline' : ''}">
        ${f.name ? `<div class="dc-embed-field-name">${escHtml(f.name)}</div>` : ''}
        ${f.value ? `<div class="dc-embed-field-value">${escHtml(f.value)}</div>` : ''}
      </div>
    `).join('');

  const fieldsHtml = fields ? `<div class="dc-embed-fields">${fields}</div>` : '';
  const thumbHtml = thumb
    ? `<img class="dc-embed-thumb" src="${escAttr(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const imageHtml = image
    ? `<img class="dc-embed-image" src="${escAttr(image)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';

  return `<div class="dc-embed" style="--embed-color:${escAttr(color)}">
    <div class="dc-embed-inner">
      <div class="dc-embed-content">
        ${author ? `<div class="dc-embed-author">${escHtml(author)}</div>` : ''}
        ${titleHtml}
        ${desc ? `<div class="dc-embed-desc">${escHtml(desc)}</div>` : ''}
        ${fieldsHtml}
        ${footer ? `<div class="dc-embed-footer">${escHtml(footer)}</div>` : ''}
      </div>
      ${thumbHtml}
    </div>
    ${imageHtml}
  </div>`;
}

function addMessage() {
  const msg = createMessage();
  state.messages.push(msg);
  renderEditors();
  renderPreview();
  // Focus new textarea and scroll it into view
  setTimeout(() => {
    const ta = document.querySelector(`[data-id="${msg.id}"] .msg-textarea`);
    if (ta) {
      ta.focus();
      ta.closest('.message-editor').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 50);
}

function removeMessage(id) {
  state.messages = state.messages.filter(m => m.id !== id);
  renderEditors();
  renderPreview();
}

function moveMessage(id, dir) {
  const idx = state.messages.findIndex(m => m.id === id);
  const to = idx + dir;
  if (to < 0 || to >= state.messages.length) return;
  [state.messages[idx], state.messages[to]] = [state.messages[to], state.messages[idx]];
  renderEditors();
  renderPreview();
}

// ---- Render editors ----
function renderEditors() {
  const list = document.getElementById('message-list');
  list.innerHTML = '';
  state.messages.forEach((msg, idx) => {
    const div = document.createElement('div');
    div.className = 'message-editor';
    div.dataset.id = msg.id;
    const limit = LIMITS[msg.plan];
    const len = msg.text.length;
    const counterClass = len > limit ? 'over' : len > limit * 0.9 ? 'warn' : '';
    div.innerHTML = `
      <div class="msg-header-row">
        <input class="msg-name-input" type="text" placeholder="${escAttr(t('namePlaceholder'))}" value="${escAttr(msg.name)}" maxlength="32">
        <input class="msg-color-input" type="color" value="${escAttr(msg.color)}" title="名前の色">
        <button class="msg-ctrl-btn" data-action="up" title="上へ">${t('up')}</button>
        <button class="msg-ctrl-btn" data-action="down" title="下へ">${t('down')}</button>
        <button class="msg-ctrl-btn del" data-action="del" title="削除">${t('del')}</button>
        <button class="msg-ctrl-btn ${msg.embed && msg.embed.enabled ? 'active' : ''}" data-action="toggle-embed" title="Embed">${t('embed')}</button>
        <button class="emoji-btn" data-action="emoji" title="Emoji">😀</button>
      </div>
      <textarea class="msg-textarea" maxlength="${limit + 500}" placeholder="${escAttr(t('msgPlaceholder'))}">${escHtml(msg.text)}</textarea>
      ${msg.embed && msg.embed.enabled ? renderEmbedEditorHtml(msg) : ''}
      <div class="msg-footer-row">
        <select class="plan-select">
          <option value="free" ${msg.plan==='free'?'selected':''}>Free (2000)</option>
          <option value="nitro" ${msg.plan==='nitro'?'selected':''}>Nitro (4000)</option>
        </select>
        <span class="char-counter ${counterClass}">${len} / ${limit}</span>
      </div>`;

    // Events
    div.querySelector('.msg-name-input').addEventListener('input', e => {
      msg.name = e.target.value;
      renderPreview();
    });
    div.querySelector('.msg-color-input').addEventListener('input', e => {
      msg.color = e.target.value;
      renderPreview();
    });
    const ta = div.querySelector('.msg-textarea');
    ta.addEventListener('input', e => {
      msg.text = e.target.value;
      updateCounter(div, msg);
      autoGrowTextarea(e.target);
      renderPreview();
    });
    div.querySelector('.plan-select').addEventListener('change', e => {
      msg.plan = e.target.value;
      updateCounter(div, msg);
      renderPreview();
    });
    div.querySelector('[data-action=up]').addEventListener('click', () => moveMessage(msg.id, -1));
    div.querySelector('[data-action=down]').addEventListener('click', () => moveMessage(msg.id, 1));
    div.querySelector('[data-action=del]').addEventListener('click', () => removeMessage(msg.id));
    div.querySelector('[data-action=toggle-embed]').addEventListener('click', () => {
      msg.embed.enabled = !msg.embed.enabled;
      renderEditors();
      renderPreview();
    });

    const emojiBtn = div.querySelector('[data-action=emoji]');
    emojiBtn.addEventListener('click', () => openEmojiPicker(ta, emojiBtn));

    // Embed editor events
    div.querySelectorAll('[data-embed]').forEach(el => {
      const key = el.dataset.embed;
      const evt = el.tagName === 'TEXTAREA' ? 'input' : 'input';
      el.addEventListener(evt, (e) => {
        msg.embed[key] = e.target.value;
        renderPreview();
      });
    });
    div.querySelectorAll('[data-action=add-field]').forEach(btn => {
      btn.addEventListener('click', () => {
        msg.embed.fields.push({ name: '', value: '', inline: false });
        renderEditors();
        renderPreview();
      });
    });
    div.querySelectorAll('[data-action=del-field]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.fieldIdx, 10);
        if (!Number.isFinite(i)) return;
        msg.embed.fields.splice(i, 1);
        renderEditors();
        renderPreview();
      });
    });
    div.querySelectorAll('[data-field-idx][data-field-key]').forEach(el => {
      const i = parseInt(el.dataset.fieldIdx, 10);
      const k = el.dataset.fieldKey;
      const ev = el.type === 'checkbox' ? 'change' : 'input';
      el.addEventListener(ev, (e) => {
        if (!msg.embed.fields[i]) return;
        msg.embed.fields[i][k] = (e.target.type === 'checkbox') ? e.target.checked : e.target.value;
        renderPreview();
      });
    });

    list.appendChild(div);
    // After insertion, measure with correct width and grow.
    requestAnimationFrame(() => autoGrowTextarea(ta));
  });
}

function updateCounter(editorDiv, msg) {
  const limit = LIMITS[msg.plan];
  const len = msg.text.length;
  const span = editorDiv.querySelector('.char-counter');
  span.textContent = `${len} / ${limit}`;
  span.className = 'char-counter' + (len > limit ? ' over' : len > limit * 0.9 ? ' warn' : '');
}

// ---- Render preview ----
let previewRenderCount = 0;

function renderPreview() {
  const container = document.getElementById('messages-container');
  ++previewRenderCount;

  if (state.messages.length === 0 || state.messages.every(m => !m.text.trim())) {
    container.innerHTML = `<div class="preview-empty"><div class="preview-empty-icon">💬</div><div>メッセージを入力するとプレビューが表示されます</div></div>`;
    return;
  }

  const ts = formatMsgTime();

  // Render synchronously first (without OGP)
  const fragments = state.messages
    .filter(m => m.text.trim())
    .map(msg => {
      const { html, ogpUrls } = parseMarkdown(msg.text);
      const initLetter = avatarInitial(msg.name);
      const bgColor = msg.color && msg.color !== '#ffffff' ? avatarColor(msg.name) : avatarColor(msg.name);
      return {
        msg,
        html,
        embedHtml: renderEmbed(msg.embed),
        ogpUrls: ogpEnabled ? ogpUrls : [],
        initLetter,
        bgColor: avatarColor(msg.name),
        nameColor: msg.color,
      };
    });

  container.innerHTML = fragments.map(f => `
    <div class="dc-message" data-msg-id="${f.msg.id}">
      <div class="dc-avatar" style="background:${escAttr(f.bgColor)}">${escHtml(f.initLetter)}</div>
      <div class="dc-msg-content">
        <div class="dc-msg-header">
          <span class="dc-username" style="color:${escAttr(f.nameColor)}">${escHtml(f.msg.name || 'ユーザー')}</span>
          <span class="dc-msg-ts">${escHtml(ts)}</span>
        </div>
        <div class="dc-msg-body">${f.html}</div>
        ${f.embedHtml}
        <div class="ogp-container"></div>
      </div>
    </div>`).join('');

  // Async OGP fetch
  fragments.forEach((f) => {
    if (!f.ogpUrls.length) return;
    console.log('[OGP] URLs to fetch for msg', f.msg.id, ':', f.ogpUrls);
    f.ogpUrls.forEach(async (url) => {
      const ogp = await fetchOGP(url);
      if (!ogp) { console.warn('[OGP] no result for', url); return; }
      if (!f.msg.text.includes(url)) { console.debug('[OGP] URL removed from msg, skipping', url); return; }
      const msgEl = container.querySelector(`[data-msg-id="${f.msg.id}"]`);
      if (!msgEl) { console.warn('[OGP] msg element not found in DOM, id=', f.msg.id); return; }
      const ogpContainer = msgEl.querySelector('.ogp-container');
      if (!ogpContainer) { console.warn('[OGP] ogp-container not found'); return; }
      if (ogpContainer.querySelector(`[data-ogp-url="${CSS.escape(url)}"]`)) { console.debug('[OGP] duplicate skipped', url); return; }
      const card = document.createElement('div');
      card.dataset.ogpUrl = url;
      card.innerHTML = renderOGPCard(ogp, url);
      ogpContainer.appendChild(card.firstElementChild || card);
      console.log('[OGP] card appended for', url);
    });
  });
}

// ---- Channel header ----
function updateChannelHeader() {
  const name = document.getElementById('channel-name-input').value || 'general';
  const header = document.getElementById('channel-header');
  const icon = document.getElementById('channel-icon');

// ---- Timestamp tool ----
function initTimestampTool() {
  const tzSelect = document.getElementById('ts-timezone');

  // Populate timezones
  const tzList = [
    'Asia/Tokyo', 'Asia/Seoul', 'Asia/Shanghai', 'Asia/Taipei', 'Asia/Singapore',
    'Asia/Bangkok', 'Asia/Kolkata', 'Asia/Dubai', 'Asia/Jerusalem',
    'Europe/Istanbul', 'Europe/Moscow', 'Europe/Helsinki', 'Europe/Stockholm',
    'Europe/Berlin', 'Europe/Paris', 'Europe/Rome', 'Europe/Madrid',
    'Europe/London', 'Atlantic/Reykjavik',
    'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
    'America/Anchorage', 'Pacific/Honolulu',
    'America/Sao_Paulo', 'America/Argentina/Buenos_Aires',
    'Pacific/Auckland', 'Pacific/Fiji',
    'UTC',
  ];

  tzList.forEach(tz => {
    const opt = document.createElement('option');
    opt.value = tz;
    opt.textContent = tz;
    if (tz === 'Asia/Tokyo') opt.selected = true;
    tzSelect.appendChild(opt);
  });

  // Set current datetime
  const nowBtn = document.getElementById('ts-now-btn');
  const dtInput = document.getElementById('ts-datetime');

  function setNow() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    dtInput.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    updateTsFormats();
  }
  setNow();

  nowBtn.addEventListener('click', setNow);
  dtInput.addEventListener('input', updateTsFormats);
  tzSelect.addEventListener('change', updateTsFormats);
}

function updateTsFormats() {
  const dtInput = document.getElementById('ts-datetime');
  const tzSelect = document.getElementById('ts-timezone');
  const formatsDiv = document.getElementById('ts-formats');
  const tz = tzSelect.value;
  const dtVal = dtInput.value;
  if (!dtVal) { formatsDiv.innerHTML = ''; return; }

  // Parse local datetime in selected timezone
  // We parse the datetime-local value as a moment in the selected timezone
  let unix;
  try {
    // datetime-local gives YYYY-MM-DDTHH:MM (no tz info)
    // We interpret it as being in the selected timezone
    const [datePart, timePart] = dtVal.split('T');
    const [y, mo, d] = datePart.split('-').map(Number);
    const [h, mi] = timePart.split(':').map(Number);

    // Use Intl to find the UTC offset for this datetime in the target timezone
    // by formatting a reference date and computing offset
    const localDate = new Date(Date.UTC(y, mo-1, d, h, mi));
    // Get what time it is in the target timezone at this UTC time
    const tzOffset = getTzOffsetMinutes(tz, localDate);
    unix = Math.floor(localDate.getTime() / 1000) - tzOffset * 60;
  } catch {
    formatsDiv.innerHTML = `<div style="color:var(--red)">${escHtml(t('tsParseError'))}</div>`;
    return;
  }

  const locale = lang === 'ja' ? 'ja-JP' : 'en-US';
  const tsLabels = t('tsLabels');
  const fmts = [
    { key: 't', label: tsLabels.t, opts: { hour: '2-digit', minute: '2-digit', timeZone: tz } },
    { key: 'T', label: tsLabels.T, opts: { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: tz } },
    { key: 'd', label: tsLabels.d, opts: { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: tz } },
    { key: 'D', label: tsLabels.D, opts: { year: 'numeric', month: 'long', day: 'numeric', timeZone: tz } },
    { key: 'f', label: tsLabels.f, opts: { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: tz } },
    { key: 'F', label: tsLabels.F, opts: { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: tz } },
    { key: 'R', label: tsLabels.R, opts: null },
  ];

  formatsDiv.innerHTML = fmts.map(f => {
    const code = f.key === 'f' ? `<t:${unix}>` : `<t:${unix}:${f.key}>`;
    let preview;
    if (f.key === 'R') {
      preview = formatRelative(unix);
    } else {
      try { preview = new Intl.DateTimeFormat(locale, f.opts).format(new Date(unix * 1000)); }
      catch { preview = '—'; }
    }
    return `<div class="ts-format-row">
      <div class="ts-format-code">${escHtml(code)}</div>
      <div class="ts-format-preview">${escHtml(preview)}</div>
      <button class="ts-copy-btn" data-code="${escAttr(code)}" onclick="copyTs(this)">${escHtml(t('copy'))}</button>
    </div>`;
  }).join('');
}

function getTzOffsetMinutes(tz, utcDate) {
  // Get offset of `tz` from UTC at a given UTC date
  // by comparing what the formatter says vs UTC
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false,
  });
  const parts = fmt.formatToParts(utcDate);
  const get = (t) => parseInt(parts.find(p => p.type === t).value);
  const y = get('year'), mo = get('month'), d = get('day');
  const h = get('hour') % 24, mi = get('minute'), s = get('second');
  const localMs = Date.UTC(y, mo-1, d, h, mi, s);
  return Math.round((localMs - utcDate.getTime()) / 60000);
}

function copyTs(btn) {
  const code = btn.dataset.code;
  const done = () => {
    btn.classList.add('copied');
    btn.textContent = t('copied');
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = t('copy'); }, 1500);
  };
  navigator.clipboard.writeText(code).then(done).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  });
}
